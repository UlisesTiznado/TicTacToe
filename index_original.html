<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

    <h1>Tic Tac Toe</h1>
    <h4>Desarrollado por Jesús Ulises Tiznado Ruiz</h4>
    <h4>Configura tu juego</h4>

    <div class="config">
        <label>Par de imágenes:</label>
        <select id="imageSet">
            <option value="1">X / O</option>
            <option value="2">Gato / Perro</option>
            <option value="3">Sol / Luna</option>
        </select>

        <label>Color celdas:</label>
        <input type="color" id="color1" value="#ffffff">
        <input type="color" id="color2" value="#cccccc">

        <label>Color línea ganadora:</label>
        <input type="color" id="winColor" value="#ff0000">

        <button onclick="startGame()">Iniciar Juego</button>
    </div>

    <!-- Temporizador -->
    <h2 id="timer">03:00</h2>

    <!-- Tablero -->
    <div id="board" class="board"></div>
    <h2 id="message"></h2>
<button id="restartBtn" onclick="startGame()" style="display:none;">
    Reiniciar juego
</button>

    <script src="functions/functions.js"></script>
</body>
</html>
